name: Pulse

on:
  push:
    branches: [main, 'feature/**', 'fix/**', 'chore/**', 'refactor/**']
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:

  # ─── JOB 1: LINT ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ─── JOB 2: TYPECHECK ─────────────────────────────────────────────────────
  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npx tsc --noEmit

  # ─── JOB 3: BUNDLE AUDIT ──────────────────────────────────────────────────
  bundle-audit:
    name: Bundle Audit
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for known vulnerabilities
        run: npm audit --audit-level=high

      - name: Check for outdated peer dependencies
        run: npm ls --depth=0
        continue-on-error: true

  # ─── JOB 4: BUILD ─────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, bundle-audit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.es.js      || (echo "dist/index.es.js missing"  && exit 1)
          test -f dist/index.cjs.js     || (echo "dist/index.cjs.js missing" && exit 1)
          test -f dist/types/index.d.ts || (echo "types missing"             && exit 1)

      - name: Verify fonts bundled
        run: |
          FONT_COUNT=$(find dist/assets -name "*.OTF" 2>/dev/null | wc -l)
          echo "OTF fonts found in dist/assets: $FONT_COUNT"
          [ "$FONT_COUNT" -ge 1 ] || (echo "No fonts found in dist/assets" && exit 1)

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─── JOB 5: SONARQUBE ─────────────────────────────────────────────────────
  sonar:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectName=${{ secrets.SONAR_PROJECT_NAME }}
            -Dsonar.projectVersion=${{ steps.pkg.outputs.version }}

  # ─── JOB 6: QUALITY GATE ──────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [sonar]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
